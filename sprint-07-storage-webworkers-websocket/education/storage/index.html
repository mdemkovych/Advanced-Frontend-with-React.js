<body>
<h1>Storage & Cookies Demo</h1>

<h2>LocalStorage</h2>
<button id="setLocal">Set localStorage</button>
<button id="clearLocal">Clear localStorage</button>

<h2>SessionStorage</h2>
<button id="setSession">Set sessionStorage</button>
<button id="clearSession">Clear sessionStorage</button>

<h2>Cookies</h2>
<button id="setCookie">Set Cookie</button>
<button id="readCookie">Read Cookies</button>
<button id="deleteCookie">Delete Cookie</button>
